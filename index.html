<!DOCTYPE html> <html lang="ko"> <head> <meta charset="UTF-8"> <title>손실 복구 계산기</title> <style> body { background: #111; color: white; text-align: center; font-family: sans-serif; } .box { margin-top: 50px; } input { padding: 10px; margin: 10px; width: 200px; font-size: 16px; } button { padding: 12px 20px; background: orange; border: none; font-size: 18px; cursor: pointer; } .result { margin-top: 20px; font-size: 22px; color: #00ff88; } </style> </head> <body> <h1>손실 복구 계산기</h1> <div class="box"> <input id="count" placeholder="낙첨 폴더 수"> <br> <input id="amount" placeholder="평균 배팅액 (원)"> <br> <button onclick="calc()">복구 금액 계산</button> <div class="result" id="result"></div> </div> <script> function calc(){ let count = parseInt(document.getElementById("count").value); let amount = parseInt(document.getElementById("amount").value); if(!count || !amount){ alert("값 입력하세요"); return; } let loss = count * amount; // 복구 계산 (예: 2배 필요) let recovery = loss * 2; document.getElementById("result").innerHTML = "손실 금액: " + loss.toLocaleString() + "원<br>" + "복구 필요 금액: " + recovery.toLocaleString() + "원"; } </script> </body> </html>
